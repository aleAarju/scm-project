<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlowCart Shopping Website</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#fff5f7;
}

/* ================= HEADER ================= */
header{
  background:#ff4d88;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position: relative;
  z-index: 5000;
}

header h1{
  font-size:32px;
}

/* ================= HERO ================= */
.hero{
  height:300px;
  background:linear-gradient(to right,#ff9a9e,#fad0c4);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  text-align:center;
}

.hero h2{
  font-size:40px;
  margin-bottom:10px;
}

.hero button{
  padding:10px 20px;
  border:none;
  background:white;
  color:#ff4d88;
  font-size:18px;
  border-radius:5px;
  cursor:pointer;
}

/* ================= PRODUCTS ================= */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:40px;
}

.card{
  background:white;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  padding:20px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

.card h3{
  margin:15px 0 10px;
}

.price{
  color:#ff4d88;
  font-size:20px;
  margin-bottom:10px;
}

.card button{
  background:#ff4d88;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:5px;
  cursor:pointer;
}

/* ================= NAVBAR ================= */
.navbar{
  background: white;
  padding: 12px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  position: relative;
  z-index: 2000;
}

.navbar nav{
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
}

.navbar nav a{
  text-decoration: none;
  color: #ff4d88;
  font-weight: bold;
}

/* ================= DROPDOWN ================= */
.dropdown{
  position: relative;
}

.dropdown-content{
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: white;
  min-width: 180px;
  border-radius: 8px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  z-index: 4000;
}

.dropdown-content a{
  display: block;
  padding: 12px;
  color: #ff4d88;
}

.dropdown-content a:hover{
  background: #ffe6ee;
}

.dropdown:hover .dropdown-content{
  display: block;
}

/* ================= SEARCH ================= */
.search-container input{
  width: 220px;
  padding: 8px 15px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

/* ================= SLIDER ================= */
.slider{
  width: 100%;
  height: 500px;
  overflow: hidden;
  background: #fff5f7;
}

.slides{
  display: flex;
  width: 400%;
  animation: swipe 12s infinite ease-in-out;
}

.slides img{
  width: 100vw;
  height: 500px;
  object-fit: contain;
  flex-shrink: 0;
  background: #fff5f7;
}

/* animation unchanged */
@keyframes swipe{
  0%{transform: translateX(0);}
  20%{transform: translateX(0);}
  25%{transform: translateX(-100vw);}
  45%{transform: translateX(-100vw);}
  50%{transform: translateX(-200vw);}
  70%{transform: translateX(-200vw);}
  75%{transform: translateX(-300vw);}
  95%{transform: translateX(-300vw);}
  100%{transform: translateX(0);}
}

/* ================= ACCOUNT ================= */
.my-account{
  position: relative;
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
  z-index: 3000;
}

.my-account .fa-user{
  font-size: 28px;
}

.account-text{
  display: flex;
  flex-direction: column;
}

.account-text span{
  font-size: 12px;
  color:white;
}

.account-text a{
  color: white;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* dropdown FIX (this is the important part) */
.account-dropdown{
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: white;
  min-width: 160px;
  border-radius: 8px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  z-index: 5000;
  flex-direction: column;
}

.account-dropdown a{
  display: block;
  padding: 10px 12px;
  color: #ff4d88;
  text-decoration: none;
}

.account-dropdown a:hover{
  background: #ffe6ee;
}

/* IMPORTANT FIX: only account triggers dropdown */
.account-dropdown:hover .account-dropdown{
  display: flex;
}

/* ================= CART (NO HOVER EVER) ================= */
.cart-icon{
  position: relative;
  margin-left: 15px;
  cursor: default;
  z-index: 6000;
}

.cart-icon i{
  font-size: 24px;
  color: white;
  pointer-events: none;
}

.cart-icon:hover{
  transform: none;
  background: transparent;
  box-shadow: none;
}
nav{
  display: flex;
  align-items: center;
  gap: 30px;
}

/* extra spacing between account and cart */
.account-text{
  margin-left:10px;
}

.cart-icon{
  margin-right: 23px;
}
.my-account, .cart-icon{
  position: relative;
}

.my-account{
  position: relative;
}

.account-dropdown{
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: white;
}

.my-account:hover .account-dropdown{
  display: flex;
}
header nav{
  display: flex;
  align-items: center;
  gap: 40px;
}
.right-nav{
  display: flex;
  align-items: center;
  gap: 50px; /* real separation */
}
  </style>
</head>


<body>

</div>
<div class="slider">
